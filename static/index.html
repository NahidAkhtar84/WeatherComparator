<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #334155 100%);
        }

        .title,
        .subtitle,
        .label,
        .has-text-light-custom {
            color: #f8fafc;
        }

        .weather-card { margin-bottom: 1.5rem; height: 100%; }

        .dashboard-shell {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.28);
            backdrop-filter: blur(14px);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 16px;
            padding: 1rem;
        }

        .status-value {
            color: #38bdf8;
            font-size: 1.35rem;
            font-weight: 700;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 16px;
        }

        .tag-soft {
            background: #e0f2fe;
            color: #0f172a;
        }
    </style>
</head>
<body>
<section class="section">
    <div class="container">
        <div class="dashboard-shell">
            <h1 class="title">Live Weather Dashboard</h1>
            <p class="subtitle has-text-light-custom">Real-time weather comparison from multiple providers.</p>

            <div class="status-grid">
                <div class="status-card">
                    <p class="label">City</p>
                    <div id="city-name" class="status-value">-</div>
                </div>
                <div class="status-card">
                    <p class="label">API calling interval</p>
                    <div id="polling-interval" class="status-value">-</div>
                </div>
                <div class="status-card">
                    <p class="label">Last data update</p>
                    <div id="last-update" class="status-value">Waiting...</div>
                </div>
                <div class="status-card">
                    <p class="label">Connection</p>
                    <div id="connection-status" class="status-value">Connecting...</div>
                </div>
                <div class="status-card">
                    <p class="label">Min Temperature</p>
                    <div id="min-temp" class="status-value">-</div>
                </div>
                <div class="status-card">
                    <p class="label">Max Temperature</p>
                    <div id="max-temp" class="status-value">-</div>
                </div>
                <div class="status-card">
                    <p class="label">Avg Temperature</p>
                    <div id="avg-temp" class="status-value">-</div>
                </div>
            </div>

            <div id="weather" class="columns is-multiline"></div>
        </div>
    </div>
</section>
<script>
const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
const weatherContainer = document.getElementById('weather');
const cityName = document.getElementById('city-name');
const pollingInterval = document.getElementById('polling-interval');
const lastUpdate = document.getElementById('last-update');
const connectionStatus = document.getElementById('connection-status');
const minTemp = document.getElementById('min-temp');
const maxTemp = document.getElementById('max-temp');
const avgTemp = document.getElementById('avg-temp');

function formatTimestamp(value) {
    if (!value) {
        return 'Waiting...';
    }

    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleString();
}

function renderWeatherCard(item) {
    return `
        <div class="column is-one-third-desktop is-half-tablet">
            <div class="card weather-card">
                <header class="card-header">
                    <p class="card-header-title">${item.source || 'Unknown'}</p>
                    <span class="card-header-icon">
                        <span class="tag tag-soft">Live</span>
                    </span>
                </header>
                <div class="card-content">
                    <div class="content">
                        <strong>City:</strong> ${item.city || '-'}<br>
                        <strong>Source time:</strong> ${item.time || '-'}<br>
                        <strong>Temp:</strong> ${item.temperature_c ?? '-'} °C<br>
                        <strong>Humidity:</strong> ${item.humidity_percent ?? '-'} %<br>
                        <strong>Wind:</strong> ${item.wind_kmh ?? '-'} km/h<br>
                        ${item.feels_like_c !== undefined ? `<strong>Feels Like:</strong> ${item.feels_like_c} °C<br>` : ''}
                        ${item.weather ? `<strong>Weather:</strong> ${item.weather}<br>` : ''}
                        ${item.pressure_hpa ? `<strong>Pressure:</strong> ${item.pressure_hpa} hPa<br>` : ''}
                        ${item.error ? `<span class="has-text-danger">Error: ${item.error}</span>` : ''}
                    </div>
                </div>
            </div>
        </div>
    `;
}

ws.onopen = function() {
    connectionStatus.textContent = 'Connected';
};

ws.onmessage = function(event) {
    const payload = JSON.parse(event.data);
    const sources = payload.sources || [];
    const stats = payload.stats || {};

    cityName.textContent = payload.city || '-';
    pollingInterval.textContent = `${payload.interval_seconds ?? '-'} sec`;
    lastUpdate.textContent = formatTimestamp(payload.updated_at);
    connectionStatus.textContent = 'Receiving live data';

    minTemp.textContent = stats.min_temp !== null ? `${stats.min_temp}°C` : '-';
    maxTemp.textContent = stats.max_temp !== null ? `${stats.max_temp}°C` : '-';
    avgTemp.textContent = stats.avg_temp !== null ? `${stats.avg_temp}°C` : '-';

    weatherContainer.innerHTML = sources.map(renderWeatherCard).join('');
};

ws.onclose = function() {
    connectionStatus.textContent = 'Disconnected';
};

ws.onerror = function() {
    connectionStatus.textContent = 'Connection error';
};
</script>
</body>
</html>
